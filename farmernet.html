<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0E2E1A">
<title>AgroMind — FermerNet</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#0E2E1A;
  --secondary:#1F6B3C;
  --accent:#3AAD65;
  --accent-light:#5CC880;
  --blue:#1A62D4;
  --blue-light:#3D82EF;
  --bg:#F5F7F5;
  --surface:#fff;
  --text:#0D1117;
  --text-secondary:#6E7681;
  --text-muted:#8B949E;
  --border:#E6EBF0;
  --shadow:0 4px 20px rgba(0,0,0,.08);
  --shadow-strong:0 8px 30px rgba(0,0,0,.12);
  --gradient:linear-gradient(145deg,var(--primary) 0%,var(--secondary) 100%);
  --gradient-accent:linear-gradient(135deg,var(--secondary) 0%,var(--accent) 100%);
}

*{
  margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  font-family:'Nunito',sans-serif;
}

html,body{
  width:100%;height:100%;
  background:var(--primary);
  overflow:hidden;
  touch-action:manipulation;
}

#app{
  width:100%;height:100%;
  max-width:100%;
  position:relative;
  background:var(--bg);
}

@media(min-width:500px){
  body{display:flex;justify-content:center;align-items:center;background:#0a1f10;}
  #app{
    max-width:430px;height:95vh;max-height:900px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 60px rgba(0,0,0,.5);
  }
}

.screen{
  display:none;flex-direction:column;
  width:100%;height:100%;
  background:var(--bg);
  position:absolute;inset:0;
  animation:fadeIn .3s ease;
}

.screen.active{display:flex;}
@keyframes fadeIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}

/* HEADER */
.cl-header{
  background:var(--gradient);
  padding:52px 20px 16px;
  padding-top:calc(52px + env(safe-area-inset-top,0));
  position:relative;z-index:10;
}

.cl-header::after{
  content:'';position:absolute;bottom:-20px;left:0;right:0;
  height:40px;background:var(--surface);
  border-radius:20px 20px 0 0;
}

.cl-header-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;position:relative;z-index:1;
}

.cl-title{
  font-family:'Syne',sans-serif;
  font-size:26px;font-weight:800;
  color:#fff;letter-spacing:-.5px;
  display:flex;align-items:center;gap:8px;
}

.cl-subtitle{
  font-size:12px;color:rgba(255,255,255,.7);
  margin-top:4px;font-weight:600;
  display:flex;align-items:center;gap:6px;
}

.cl-header-btns{display:flex;gap:10px;}

.cl-icon-btn{
  width:40px;height:40px;
  background:rgba(255,255,255,.15);
  border:none;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;color:#fff;cursor:pointer;
  backdrop-filter:blur(10px);
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}

.cl-icon-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
  opacity:0;transition:opacity .2s;
}

.cl-icon-btn:hover::before{opacity:1;}
.cl-icon-btn:active{transform:scale(.92);}

.cl-icon-btn .badge{
  position:absolute;top:-2px;right:-2px;
  width:18px;height:18px;
  background:#EF4444;color:#fff;
  border-radius:50%;font-size:10px;
  font-weight:800;display:flex;
  align-items:center;justify-content:center;
  border:2px solid var(--primary);
}

.cl-search{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.2);
  border-radius:16px;padding:12px 16px;
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);
  position:relative;z-index:1;
  transition:all .2s;
}

.cl-search:focus-within{
  background:rgba(255,255,255,.25);
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}

.cl-search input{
  flex:1;background:none;border:none;outline:none;
  font-size:15px;font-weight:600;color:#fff;
}

.cl-search input::placeholder{color:rgba(255,255,255,.6);}

/* STORIES */
.story-section{
  background:var(--surface);
  padding:16px 0 8px;
  border-bottom:1px solid var(--border);
}

.story-row{
  display:flex;gap:16px;
  overflow-x:auto;padding:0 20px 8px;
  scrollbar-width:none;
}

.story-row::-webkit-scrollbar{display:none;}

.story-item{
  display:flex;flex-direction:column;
  align-items:center;gap:6px;
  flex-shrink:0;cursor:pointer;
  transition:transform .2s;
}

.story-item:active{transform:scale(.95);}

.story-ring{
  width:64px;height:64px;
  border-radius:50%;padding:3px;
  background:var(--gradient-accent);
  position:relative;
  transition:all .3s;
}

.story-ring.seen{background:var(--border);}
.story-ring.live::after{
  content:'LIVE';position:absolute;bottom:-4px;left:50%;
  transform:translateX(-50%);
  background:#EF4444;color:#fff;
  font-size:8px;font-weight:900;
  padding:2px 6px;border-radius:10px;
  letter-spacing:.5px;
}

.story-avatar{
  width:100%;height:100%;
  border-radius:50%;border:3px solid var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:800;font-family:'Syne',sans-serif;
  background:var(--bg);overflow:hidden;
}

.story-avatar img{width:100%;height:100%;object-fit:cover;}

.story-add-btn{
  position:absolute;bottom:-2px;right:-2px;
  width:24px;height:24px;
  background:var(--accent);
  border-radius:50%;border:3px solid var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:#fff;font-weight:900;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.story-name{
  font-size:11px;font-weight:700;
  color:var(--text);max-width:64px;
  text-align:center;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}

.story-time{font-size:10px;color:var(--text-muted);}

/* TABS */
.cl-tabs{
  display:flex;background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 20px;position:sticky;top:0;z-index:5;
}

.cl-tab{
  flex:1;padding:14px 0;
  font-size:13px;font-weight:800;
  color:var(--text-muted);background:none;
  border:none;cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .2s;position:relative;
  font-family:'Nunito',sans-serif;
}

.cl-tab.active{
  color:var(--accent);
  border-bottom-color:var(--accent);
}

.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;
  background:var(--accent);color:#fff;
  border-radius:10px;font-size:10px;
  font-weight:800;margin-left:6px;
  padding:0 6px;
}

.tab-badge.muted{background:var(--text-muted);}

/* CHAT LIST */
.chat-list{
  flex:1;overflow-y:auto;
  background:var(--surface);
  padding-top:8px;
}

.chat-list::-webkit-scrollbar{width:4px;}
.chat-list::-webkit-scrollbar-thumb{
  background:var(--border);border-radius:2px;
}

.chat-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 20px;cursor:pointer;
  transition:all .15s;position:relative;
}

.chat-item:hover{background:var(--bg);}
.chat-item:active{background:#E8F5E9;}
.chat-item.unread{background:#F0FBF4;}

.chat-item::after{
  content:'';position:absolute;bottom:0;
  left:78px;right:20px;height:1px;
  background:var(--border);
}

.chat-item:last-child::after{display:none;}

.chat-av-wrap{position:relative;flex-shrink:0;}

.chat-av{
  width:54px;height:54px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:800;font-family:'Syne',sans-serif;
  position:relative;overflow:hidden;
  transition:transform .2s;
}

.chat-item:hover .chat-av{transform:scale(1.05);}

.online-badge{
  position:absolute;bottom:2px;right:2px;
  width:14px;height:14px;
  background:var(--accent);
  border-radius:50%;border:2.5px solid var(--surface);
  box-shadow:0 0 0 2px var(--accent);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{box-shadow:0 0 0 2px var(--accent);}
  50%{box-shadow:0 0 0 4px rgba(58,173,101,.3);}
}

.typing-badge{
  position:absolute;bottom:2px;right:2px;
  width:18px;height:18px;
  background:var(--blue);
  border-radius:50%;border:2px solid var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;
}

.chat-info{flex:1;min-width:0;}

.chat-name{
  font-size:15px;font-weight:800;
  color:var(--text);margin-bottom:4px;
  display:flex;align-items:center;gap:6px;
}

.chat-name .verified{
  width:16px;height:16px;
  background:var(--blue);color:#fff;
  border-radius:50%;font-size:10px;
  display:flex;align-items:center;justify-content:center;
}

.chat-preview{
  font-size:13px;color:var(--text-secondary);
  font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:6px;
}

.chat-preview .sender{color:var(--accent);font-weight:700;}
.chat-preview .draft{color:#EF4444;font-weight:700;}

.chat-meta{
  display:flex;flex-direction:column;
  align-items:flex-end;gap:6px;flex-shrink:0;
}

.chat-time{
  font-size:11px;font-weight:700;
  color:var(--text-muted);
}

.chat-time.unread{color:var(--accent);}

.unread-count{
  min-width:22px;height:22px;
  background:var(--accent);color:#fff;
  border-radius:11px;display:flex;
  align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
  padding:0 6px;
  animation:badgePop .3s cubic-bezier(.34,1.56,.64,1);
}

@keyframes badgePop{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

.unread-count.muted{background:var(--text-muted);}
.pin-icon{font-size:14px;color:var(--text-muted);}

/* SECTION HEADER */
.section-header{
  padding:16px 20px 8px;
  font-size:11px;font-weight:800;
  color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.5px;
  background:var(--bg);
  display:flex;align-items:center;gap:8px;
}

/* FAB */
.fab-btn{
  position:fixed;
  bottom:calc(90px + env(safe-area-inset-bottom,0));
  right:20px;width:60px;height:60px;
  background:var(--gradient-accent);
  border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;color:#fff;cursor:pointer;
  box-shadow:0 6px 24px rgba(58,173,101,.4);
  z-index:90;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}

.fab-btn:hover{transform:scale(1.1) rotate(90deg);}
.fab-btn:active{transform:scale(.95);}

@media(min-width:500px){
  .fab-btn{right:calc(50% - 215px + 20px);}
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(76px + env(safe-area-inset-bottom,0));
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  justify-content:space-around;
  padding:0 10px;
  padding-bottom:env(safe-area-inset-bottom,0);
  z-index:80;
  box-shadow:0 -4px 20px rgba(0,0,0,.05);
}

@media(min-width:500px){
  .bottom-nav{
    left:50%;right:auto;
    transform:translateX(-50%);
    width:430px;border-radius:0 0 20px 20px;
  }
}

.nav-btn{
  display:flex;flex-direction:column;
  align-items:center;gap:4px;
  padding:8px 16px;border-radius:16px;
  background:transparent;border:none;
  flex:1;cursor:pointer;
  transition:all .2s;position:relative;
}

.nav-btn .ni{
  font-size:24px;
  transition:transform .2s;
  filter:grayscale(100%);
  opacity:.6;
}

.nav-btn .nl{
  font-size:11px;font-weight:700;
  color:var(--text-muted);
  transition:all .2s;
}

.nav-btn.on{
  background:#F0FBF4;
}

.nav-btn.on .ni{
  filter:none;opacity:1;
  transform:translateY(-2px);
}

.nav-btn.on .nl{color:var(--accent);font-weight:800;}

.nav-btn .nav-badge{
  position:absolute;top:4px;right:20px;
  width:8px;height:8px;
  background:#EF4444;
  border-radius:50%;
  border:2px solid var(--surface);
}

/* CHAT ROOM */
.cr-header{
  background:var(--gradient);
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  padding-top:calc(12px + env(safe-area-inset-top,0));
  position:sticky;top:0;z-index:50;
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}

.cr-back{
  width:40px;height:40px;
  background:rgba(255,255,255,.15);
  border:none;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#fff;cursor:pointer;
  flex-shrink:0;transition:all .2s;
}

.cr-back:hover{background:rgba(255,255,255,.25);}
.cr-back:active{transform:scale(.95);}

.cr-av{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;font-family:'Syne',sans-serif;
  flex-shrink:0;border:2px solid rgba(255,255,255,.3);
  position:relative;overflow:hidden;
}

.cr-av.typing::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
}

.cr-info{flex:1;min-width:0;}

.cr-name{
  font-size:16px;font-weight:800;
  color:#fff;font-family:'Syne',sans-serif;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  display:flex;align-items:center;gap:6px;
}

.cr-status{
  font-size:12px;color:rgba(255,255,255,.8);
  font-weight:600;margin-top:2px;
  display:flex;align-items:center;gap:6px;
}

.cr-status .online-dot{
  width:6px;height:6px;
  background:#4ADE80;
  border-radius:50%;
  animation:blink 2s infinite;
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.cr-actions{display:flex;gap:8px;}

.cr-action-btn{
  width:40px;height:40px;
  background:rgba(255,255,255,.15);
  border:none;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all .2s;
  color:#fff;position:relative;
}

.cr-action-btn:hover{background:rgba(255,255,255,.25);}
.cr-action-btn:active{transform:scale(.95);}

/* MESSAGES */
.cr-messages{
  flex:1;overflow-y:auto;
  padding:16px;padding-bottom:80px;
  background:var(--bg) url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23288A4E' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
  display:flex;flex-direction:column;gap:4px;
  scroll-behavior:smooth;
}

.cr-messages::-webkit-scrollbar{width:4px;}
.cr-messages::-webkit-scrollbar-thumb{
  background:var(--border);border-radius:2px;
}

.msg-date{
  text-align:center;margin:16px 0;
  position:sticky;top:0;z-index:1;
}

.msg-date span{
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(10px);
  border-radius:20px;padding:6px 16px;
  font-size:11px;font-weight:700;
  color:var(--text-secondary);
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}

.msg{
  display:flex;gap:10px;max-width:85%;
  animation:msgIn .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;
}

@keyframes msgIn{
  from{opacity:0;transform:translateY(10px) scale(.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

.msg.sent{align-self:flex-end;flex-direction:row-reverse;}
.msg.recv{align-self:flex-start;}

.msg-av-sm{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;font-family:'Syne',sans-serif;
  flex-shrink:0;align-self:flex-end;
  border:2px solid var(--surface);
  box-shadow:var(--shadow);
}

.msg.sent .msg-av-sm{display:none;}

.bubble{
  padding:10px 14px;border-radius:20px;
  max-width:100%;position:relative;
  word-break:break-word;
  box-shadow:var(--shadow);
  transition:transform .2s;
}

.msg.recv .bubble{
  background:var(--surface);
  border-bottom-left-radius:6px;
  color:var(--text);
}

.msg.sent .bubble{
  background:var(--gradient-accent);
  border-bottom-right-radius:6px;
  color:#fff;
}

.bubble:hover{transform:scale(1.01);}

.bubble-name{
  font-size:12px;font-weight:800;
  margin-bottom:4px;display:flex;
  align-items:center;gap:6px;
}

.bubble-text{
  font-size:14.5px;line-height:1.6;
  font-weight:600;
}

.msg.sent .bubble-text{color:#fff;}

.bubble-time{
  font-size:10px;font-weight:700;
  margin-top:6px;display:flex;
  align-items:center;justify-content:flex-end;gap:4px;
  opacity:.8;
}

.read-tick{font-size:12px;}
.read-tick.read{color:#93DFAC;}

/* MEDIA BUBBLES */
.bubble-media{
  padding:4px;background:var(--surface);
  border-radius:20px;overflow:hidden;
}

.msg.sent .bubble-media{
  background:var(--secondary);
}

.bubble-img{
  border-radius:16px;overflow:hidden;
  cursor:pointer;position:relative;
  max-width:260px;
}

.bubble-img img{
  width:100%;display:block;
  transition:transform .3s;
}

.bubble-img:hover img{transform:scale(1.05);}

.bubble-img .img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.4),transparent);
  opacity:0;transition:opacity .2s;
  display:flex;align-items:flex-end;
  padding:12px;
}

.bubble-img:hover .img-overlay{opacity:1;}

.bubble-caption{
  padding:8px 12px;
  font-size:13px;font-weight:600;
  color:var(--text);
}

.msg.sent .bubble-caption{color:#fff;}

/* VOICE */
.bubble-voice{
  display:flex;align-items:center;gap:12px;
  min-width:200px;padding:8px;
}

.voice-play{
  width:42px;height:42px;
  border-radius:50%;border:none;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;flex-shrink:0;
  transition:all .2s;box-shadow:var(--shadow);
}

.msg.recv .voice-play{
  background:var(--accent);color:#fff;
}

.msg.sent .voice-play{
  background:rgba(255,255,255,.25);color:#fff;
}

.voice-play:hover{transform:scale(1.1);}
.voice-play:active{transform:scale(.95);}

.voice-play.playing{
  animation:pulsePlay 1s infinite;
}

@keyframes pulsePlay{
  0%,100%{box-shadow:0 0 0 0 rgba(58,173,101,.4);}
  50%{box-shadow:0 0 0 10px rgba(58,173,101,0);}
}

.voice-waveform{
  flex:1;height:32px;
  display:flex;align-items:center;gap:3px;
  cursor:pointer;padding:0 4px;
}

.voice-bar{
  width:3px;border-radius:2px;
  background:var(--border);
  transition:all .3s;
}

.msg.sent .voice-bar{background:rgba(255,255,255,.3);}
.voice-bar.active{background:var(--accent);height:100% !important;}
.msg.sent .voice-bar.active{background:#fff;}

.voice-duration{
  font-size:12px;font-weight:700;
  min-width:40px;text-align:right;
}

/* VIDEO */
.bubble-video{
  border-radius:16px;overflow:hidden;
  max-width:260px;position:relative;cursor:pointer;
}

.video-thumb{
  width:260px;height:180px;
  background:var(--primary);
  display:flex;align-items:center;justify-content:center;
  position:relative;border-radius:16px;overflow:hidden;
}

.video-play-icon{
  width:56px;height:56px;
  background:rgba(255,255,255,.95);
  border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  font-size:24px;position:relative;z-index:2;
